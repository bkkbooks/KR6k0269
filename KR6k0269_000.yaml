front:
  text: 四分律含注戒本略釋例言是書每段編輯之次第先列科文次録戒本正文次略釋次指廣戒本正文頂格寫餘皆低二格科文上冠記號原科文疏記或不同疏之前後亦或異今會通酌定之略釋皆宗南山靈芝諸撰述或直録或撮寫或加潤色或稍伸說以明白易解契於初機為旨指廣中所列次第示閲覽之先後依此次第而閲則易貫通指廣中六十三十七行六十四二十行者示此段文自第六十三頁十七行起至第六十四頁二十行止餘可例推所標卷數頁數皆依津刊疏記鈔記之會本學者研習時先熟覽科文戒本正文及略釋後再閲指廣之文詳細參核然後再統閲戒疏記全文學者初閲指廣之文及戒疏記全文時必不能盡解未可著急宜緩緩再四熟覽自能漸次貫通指廣中所示之文多彼此相似者以此對覽最能得益或於此未解而於彼處能解即彼此全相同者若對覽之亦可助記憶力余昔學律即依此方法獲益甚大
