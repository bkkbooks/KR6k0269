body:
  text: 四分律含註戒本略釋附指廣至廣教序止已下待續沙門弘一撰總科分二先預列題號大科甲初題號乙初標題四分乙二人號丙初部主號出曇甲二本文丙二註述號唐終甲初題號二乙初標題四分四分者示今所宗之律名隨說止處即為一分如是至四一部方終故名四分指廣戒疏記卷一六十三十七行六十四二十行事鈔記卷一五三行六十五行律梵語毗尼此翻為律訓為法也從教立名梵號共有三名列表如下毗尼律法教尸羅戒禁行波羅提木叉處處解脫亦名別解脫近隨分果處處解脫果別別解脫遠聖果解脫指廣事鈔記卷一六十六行七十一行同事鈔記卷十五十四行十六九行戒疏記卷一二十八二十行四十八五行含註採摘廣律釋文之要義分註於戒本中指廣戒疏記卷一一十九行二六行戒本本者根也戒為行本故曰戒本指廣戒疏記卷一六十五一行十三行同戒疏記卷一二十五行九十七行乙二人號二丙初部主號出曇無德唐言法護部律指廣戒疏記卷一六十五十五行六十六六行同戒疏記卷一六十六九行卷終丙二註述號唐終南太一山沙門道宣註指廣戒疏記卷一二九行十四行上來釋題號竟已下釋本文先預列初分大科甲二本文乙初廣略二教總序分初一段偈乙二廣略二教別序正流通正宗分乙三廣略二教總流通分後一段偈丙初歸敬三寶稽首丙二歸敬之意今演丙三列相勸持丁初戒德宗體戊初陳喻戒如戊二舉益欲護丁二略舉篇聚戊初舉教勸修欲除戊二引佛成證毗婆戊三承傳勸聽我今丁三明持毀得失戊初寄別行生二喻譬如戊二寄眾法生二喻如人丙四顯教功益世間甲二本文三乙初廣略二教總序分四丙初歸敬三寶稽首禮諸佛及法比丘僧初稽首禮是能敬儀也後列三寶是所敬境也指廣戒疏記卷二一三行二十十五行同歸敬儀第二篇丙二歸敬之意今演毗尼法令正法久住初句明意後句明益指廣戒疏記卷二二十十六行二十五十二行同事鈔記卷一十三二十行十六十九行事鈔記卷十五五六行十三行丙三列相勸持三丁初戒德宗體二戊初陳喻戒如海無涯如寶求無厭初明深廣無涯性不容穢喻次明能出眾寶求者無厭喻戒海非但清澄兼生道品三乘所重故言寶也指廣戒疏記卷二二十六十七行三十一十八行戊二舉益欲護聖法財眾集聽我說財即道品恐濫於世故云聖法合上寶也所以不合初喻者意以所出之多足顯能生之廣故但合寶即兼海矣指廣戒疏記卷二三十一十九行三十二十六行丁二略舉篇聚三戊初舉教勸修欲除四棄法及滅僧殘法障三十捨墮眾集聽我說前之三句明廣教之功下有一句舉功勸聽廣教對後七佛所說略教而言廣教有五篇唯舉四棄僧殘捨墮者舉前以概後也五篇名義如後具釋言除言滅言障者三義無異隨說皆得因此廣教能預防未來之非應起不起名為除滅非謂已犯而除滅也指廣戒疏記卷二三十二十七行三十五七行戊二引佛成證毗婆尸式棄毗舍拘留孫拘那含牟尼迦葉釋迦文諸世尊大德為我說是事初一偈列教主名二半偈結人成法說即是制指廣戒疏記卷二三十五八行三十七九行戊三承傳勸聽我今欲善說諸賢咸共聽指廣戒疏記卷二三十七十行三十八十一行丁三明持毀得失二戊初寄別行生二喻明持毀得失中分為二科初寄別行生二喻二寄眾法生二喻眾法即四人已上作羯磨事今唯指說戒而言別行即自行下文共有四喻寄於二種行法而明並以持犯分配之列表如下粗示其概一身足喻止犯初偈作持次偈寄別行二車軸喻作犯三明鏡喻止持好全作犯醜毀四兵戰喻作持勇淨寄眾法止犯怯穢持犯名義因便列表如下止持方便正念禁防三業不造諸惡名之為止止而無違順本所受名之為持持由止成故曰止持二持作犯內具三毒鼓動三業違教造境名之為作作而有違汙本所受名之為犯犯由作成故曰作犯作持勤策三業修習戒行有善起護名之為作作而無違順本所受名之為持持由作成故曰作持止犯癡心怠惰於諸勝業厭不修學名之為止止而有違汙本所受名之為犯犯由止成故曰止犯二犯譬如人毀足不堪有所涉毀戒亦如是不得生天人欲得生天上若生人中者常當護戒足勿令有毀損如御入險道失轄折軸憂毀戒亦如是死時懷恐懼寄別行生二喻中初身足喻二車軸喻身足喻中有二偈初偈約止犯之損次偈約作持之益車軸喻中一偈約作犯言轄是括輪之物在軸兩頭括束於輪指廣戒疏記卷二三十八十二行四十四十一行戊二寄眾法生二喻如人自照鏡好醜生欣慼說戒亦如是全毀生憂喜如兩陣共戰勇怯有進退說戒亦如是淨穢生安畏寄眾法生二喻中初明鏡喻二兵戰喻如前列表中各對持犯可解指廣戒疏記卷二四十五十六行四十七十九行丙四顯教功益世間王為最眾流海為最眾星月為最眾聖佛為最一切眾律中戒經為上最如來立禁戒半月半月說初偈喻辭後偈法合指廣戒疏記卷二四十八三行五十一十六行上來釋廣略二教總序分竟已下釋廣略二教別序正流通正宗分先預列廣教序大科乙二廣略二教別序正流通正宗分丙初結前生後已前丙二正示教宗丁初廣教戊初序己初集僧簡眾庚初能成之緣和合丁二略教戊二正宗己二誡敕時眾諸大庚二所成之業大德戊三流通己三三覆檢問諸大乙二廣略二教別序正流通正宗分二丙初結前生後已前偈文法護尊者所作為廣略二教通序前開持毀之言以成說聽之本也和合以下二教大宗自分三分序正流通廣略二教者佛初成道不待犯戒通禁三業略陳教法故曰略教後造諸非不謂有犯故須隨事別制廣明教法故曰廣教指廣戒疏記卷二五十一十七行六十十二行又戒疏記卷二六十十三行六十一十四行丙二正示教宗二丁初廣教三戊初序三己初集僧簡眾二庚初能成之緣已下廣教序中含註之文屬於作持非已習隨機羯磨者難於猝解故今略釋唯依廣教序中大字粗示其義餘含註文不復解釋標指廣中仍兼含註羯磨約義翻為辦事正翻為業下科大德僧聽乃至白如是之文即是說戒之羯磨故下科云所成之業也欲作羯磨之前應有事前諸方便如此科和合僧集會等文乃是能成就羯磨之前方便故此科云能成之緣也指廣戒疏記卷二六十一十五行六十四十九行事鈔記卷五二十二十七行四十二十一行作羯磨前應具十緣今文唯列七者以餘不須問此七必問又今文七中六種通於諸法教尼限於說戒非常途十緣所攝列表如下一稱量前事和合二法起託處三集僧方法僧集會四僧集約界羯磨具十緣五應法和合六簡眾是非未受大戒者出今文七說欲清淨不來諸比丘說欲及清淨八正陳本意比丘尼眾遣何人來耶九問事端緒今僧和合何所作為十答所成法說戒羯磨廣教序中指廣之文若具錄事鈔業疏記者文近十卷則太繁廣又今所研習正在戒本於作持諸義亦不須廣張繁文故已下指廣唯略引明不復廣徵旁證指廣事鈔記卷十一十四十六行三十三十行此章事鈔記文正明說戒儀軌具含下列七緣故列於七緣之前總示說儀不別分配和合時有乃至眾也和合僧集會二緣刪定戒本改云僧集和合較順即僧法六和也列表如下僧和有二義理和初果已上所證同故事和內凡已下即下所云六和也六和同戒正戒正戒是入道之基無受戒不得受已毀破之過三體別人恆具同見正見正見乃絕縛之慧是為內德無邪見執見各異之過體和必具三體同利正命正命為成道之緣乃名僧寶無非法乞求邪意活命之過身和應來者來三和臨事方彰心和應與欲者與欲相和是為外用口和現前得訶者不訶必具三相方能辦事和合相和六和依三體而成三相體相俱備內外兩和僧集會體和指廣戒疏記卷二六十四二十行六十六一行事鈔記卷十一一十三行三十一行業疏記卷四二十二十七行二十三十九行又業疏記卷二九十行十一一行事鈔記卷七十一六行十二十五行僧集會時有乃至治之指廣戒疏記卷二六十六二行六十九三行又事鈔記卷十一九十五行十四十五行事鈔記卷十一四十四十行卷終未受大戒者出時有乃至作也此明簡眾不唯沙彌或尼三眾俗士瞻禮並須遣出指廣戒疏記卷二六十九四行七十一十行不來諸比丘說欲及清淨時說乃至故也欲者希須為義謂心有所望也僧作法事因事不來遣致心意示無違背故曰說欲清淨者示行無乖欲及清淨可約六和分配如下表列欲表心無二相和三和中心和口和清淨表行無乖體和戒見利同指廣戒疏記卷二七十一十一行七十二十七行比丘尼眾遣何人來耶佛言乃至誡也僧說戒前尼請僧往教誡教誡有廣略二法唐時廣法不行故事鈔業疏唯存略法宋時略法亦廢濟緣記云今時廣略俱廢止可聞知用為來習耳指廣戒疏記卷二七十二十八行七十三二十行今僧和合何所作為指廣戒疏記卷二七十四一行五行彼應答言說戒羯磨佛言乃至治也指廣戒疏記卷二七十四六行卷終庚二所成之業大德僧聽今僧十五日布薩說戒若僧時到僧忍聽布薩說戒白如是佛言乃至戒也僧聽之聽去呼即耳識所得也忍聽之聽平呼即聽許也忍聽者勸令情和聽可勿事乖違僧時到者僧時分為二一者人到清淨大沙門入也二者時到十五日布薩時至也布薩翻為淨住淨身口意住於戒故指廣戒疏記卷三一三行八十行事鈔記卷五四十九八行五十十四行事鈔記卷十一六六行九十四行己二誡敕時眾諸大德我今欲說波羅提木叉佛言乃至故也指廣戒疏記卷三八十一行十六十七行諸比丘共集在一處佛言乃至如律指廣戒疏記卷三十六十八行十九十二行事鈔記卷十一三十八五行四十四九行汝等諦聽善思念之佛言乃至法也指廣戒疏記卷三十九十三行二十三行若自知有犯者即應自懺悔佛言乃至後說指廣戒疏記卷三二十四行二十三八行不犯者默然默然者知諸大德清淨佛言乃至懺也指廣戒疏記卷三二十三九行十九行若有他問者亦如是答佛言乃至答也指廣戒疏記卷三二十三二十行二十四十一行如是比丘在眾中乃至三問憶念有罪不懺悔者得故妄語妄語者佛說障道法佛言乃至戒也指廣戒疏記卷三二十四十二行三十九一行若彼比丘憶念有罪欲求清淨者應懺悔懺悔得安樂佛言乃至樂也指廣戒疏記卷三三十九二行九行己三三覆檢問諸大德我已說戒經序今問諸大德是中清淨否三說諸大德是中清淨默然故是事如是持是中乃問僧中也非指戒文言指廣戒疏記卷三三十九十行四十二六行上來釋廣教序竟
